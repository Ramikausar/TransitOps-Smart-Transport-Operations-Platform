{% extends "base.html" %}

{% block title %}Record Not Found - TransitOps{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center py-5">
    <div class="col-md-6 text-center">
        <i class="bi bi-question-circle text-warning" style="font-size: 5rem;"></i>
        <h1 class="display-5 font-weight-bold mt-3 text-dark">404 - Not Found</h1>
        <p class="text-muted leading-relaxed">
            The record or page you are looking for does not exist. It might have been deleted or the URL might be incorrect.
        </p>
        <div class="mt-4">
            <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary px-4 py-2">
                <i class="bi bi-house me-2"></i>Return to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
